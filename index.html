<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa-T Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0f;
            --ink2: #13131a;
            --surface: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --accent: #22c55e;
            --accent2: #16a34a;
            --muted: rgba(255,255,255,0.35);
            --text: #f0f0f5;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--ink);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(232,255,62,0.06); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(255,107,53,0.05); bottom: 100px; left: -80px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes loading-bar {
            0% { left: -40%; }
            50% { left: 40%; }
            100% { left: 110%; }
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes card-enter {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes success-pop {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes dropdownOpen {
            from { opacity: 0; transform: translateY(-8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .anim-fadeUp { animation: fadeUp 0.5s ease forwards; }
        .anim-fadeIn { animation: fadeIn 0.4s ease forwards; }
        .anim-slideIn { animation: slideInBottom 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
        .anim-cardEnter { animation: card-enter 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
        .anim-successPop { animation: success-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .anim-dropdownOpen { animation: dropdownOpen 0.2s cubic-bezier(0.16,1,0.3,1) forwards; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .card-glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }

        .btn-accent {
            background: var(--accent);
            color: var(--ink);
            font-weight: 700;
            border-radius: 14px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-accent::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-accent:active { transform: scale(0.97); }
        .btn-accent:hover::after { opacity: 1; }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 14px;
            transition: all 0.2s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-ghost:active { transform: scale(0.97); }

        .input-dark {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .input-dark::placeholder { color: rgba(255,255,255,0.25); }
        .input-dark:focus {
            border-color: var(--accent);
            background: rgba(34,197,94,0.04);
        }

        .nav-bar {
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.1);
            color: var(--accent);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .workout-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .workout-card:hover { transform: translateY(-2px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

        .ticker-wrap {
            overflow: hidden;
            background: var(--accent);
            padding: 8px 0;
        }
        .ticker-inner {
            display: flex;
            white-space: nowrap;
            animation: ticker 18s linear infinite;
        }
        .ticker-item {
            color: var(--ink);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.1em;
            padding: 0 24px;
        }

        .activity-row {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .activity-row:last-child { border-bottom: none; }
        .activity-row:hover { background: rgba(255,255,255,0.02); }

        .pulse-dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            position: relative;
        }
        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        select.input-dark option {
            background: #1a1a24;
            color: #f0f0f5;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .completed-badge {
            background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(74,222,128,0.05));
            border: 1px solid rgba(74,222,128,0.3);
            color: #4ade80;
            border-radius: 14px;
        }

        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
        }

        .segment {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
            display: flex;
        }
        .segment-btn {
            flex: 1;
            padding: 8px;
            border-radius: 9px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
        }
        .segment-btn.active {
            background: var(--accent);
            color: var(--ink);
        }

        .timer-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 80px;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--text);
        }
        .timer-display.danger { color: #ff6b35; }

        .delay-1 { animation-delay: 0.05s; animation-fill-mode: both; }
        .delay-2 { animation-delay: 0.1s; animation-fill-mode: both; }
        .delay-3 { animation-delay: 0.15s; animation-fill-mode: both; }
        .delay-4 { animation-delay: 0.2s; animation-fill-mode: both; }
        .delay-5 { animation-delay: 0.25s; animation-fill-mode: both; }

        .login-bg {
            background: radial-gradient(ellipse at 80% 0%, rgba(34,197,94,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 0% 100%, rgba(255,107,53,0.07) 0%, transparent 50%),
                        var(--ink);
        }

        /* ---- CLIENT SELECTOR ---- */
        .client-selector-wrapper {
            position: relative;
        }
        .client-selector-trigger {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            text-align: left;
        }
        .client-selector-trigger.open,
        .client-selector-trigger:focus {
            border-color: var(--accent);
            background: rgba(34,197,94,0.04);
        }
        .client-selector-trigger.has-value {
            border-color: rgba(34,197,94,0.4);
            background: rgba(34,197,94,0.06);
        }
        .client-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #1e1e2e;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            z-index: 200;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .client-search-box {
            padding: 12px 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .client-search-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px 10px 36px;
            width: 100%;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            transition: border-color 0.2s;
        }
        .client-search-input::placeholder { color: rgba(255,255,255,0.25); }
        .client-search-input:focus {
            border-color: var(--accent);
            background: rgba(34,197,94,0.04);
        }
        .client-search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            pointer-events: none;
        }
        .client-list {
            max-height: 220px;
            overflow-y: auto;
            padding: 6px;
        }
        .client-list::-webkit-scrollbar { width: 3px; }
        .client-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .client-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }
        .client-option:hover {
            background: rgba(255,255,255,0.06);
        }
        .client-option.selected {
            background: rgba(34,197,94,0.1);
        }
        .client-option-avatar {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.07);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            color: var(--text);
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .client-option.selected .client-option-avatar {
            background: rgba(34,197,94,0.2);
            color: var(--accent);
        }
        .client-option-info { flex: 1; min-width: 0; }
        .client-option-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .client-option-email {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .client-option-check {
            color: var(--accent);
            font-size: 11px;
            flex-shrink: 0;
        }
        .client-empty {
            padding: 20px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }
        .client-count-badge {
            background: rgba(34,197,94,0.12);
            color: var(--accent);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .letter-divider {
            padding: 4px 12px 2px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <div id="install-banner" style="display: none;" class="fixed bottom-4 left-4 right-4 z-50">
        <div class="card-glass p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center" style="background:var(--accent)">
                    <i class="fa-solid fa-mobile-screen-button text-black"></i>
                </div>
                <div>
                    <p class="font-bold text-sm text-white">Instalar Activa-T Gym</p>
                    <p class="text-xs" style="color:var(--muted)">Acceso rápido desde tu menú</p>
                </div>
            </div>
            <button id="install-button" class="btn-accent px-4 py-2 text-xs">INSTALAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        window.doc = doc;
        window.setDoc = setDoc;
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVT1Mx8dbizJ9nXBIXJcIWjcof_b0fsec",
            authDomain: "activa-t-aea86.firebaseapp.com",
            projectId: "activa-t-aea86",
            storageBucket: "activa-t-aea86.firebasestorage.app",
            messagingSenderId: "180811299847",
            appId: "1:180811299847:web:9ba9668e41ab998f47fea2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.firestore = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc };
        window.firebaseAuth = { onAuthStateChanged, signOut };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`}></i>
        );

        // ========================
        // CLIENT SELECTOR COMPONENT
        // ========================
        function ClientSelector({ clients, selectedClient, onSelect }) {
            const [open, setOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            const searchRef = useRef(null);

            // Sort clients alphabetically
            const sortedClients = [...clients].sort((a, b) =>
                a.name.localeCompare(b.name, 'es', { sensitivity: 'base' })
            );

            // Filter by search
            const filtered = sortedClients.filter(c =>
                c.name.toLowerCase().includes(search.toLowerCase()) ||
                c.email.toLowerCase().includes(search.toLowerCase())
            );

            // Group by first letter
            const grouped = filtered.reduce((acc, client) => {
                const letter = client.name.charAt(0).toUpperCase();
                if (!acc[letter]) acc[letter] = [];
                acc[letter].push(client);
                return acc;
            }, {});

            const selectedClientObj = clients.find(c => c.id === selectedClient);

            // Close on outside click
            useEffect(() => {
                const handler = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
                        setOpen(false);
                        setSearch('');
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            // Focus search when opens
            useEffect(() => {
                if (open && searchRef.current) {
                    setTimeout(() => searchRef.current?.focus(), 50);
                }
            }, [open]);

            const handleSelect = (clientId) => {
                onSelect(clientId);
                setOpen(false);
                setSearch('');
            };

            return (
                <div className="client-selector-wrapper" ref={wrapperRef}>
                    {/* Trigger button */}
                    <button
                        type="button"
                        className={`client-selector-trigger ${open ? 'open' : ''} ${selectedClient ? 'has-value' : ''}`}
                        onClick={() => setOpen(!open)}
                    >
                        {selectedClientObj ? (
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1, minWidth: 0 }}>
                                <div style={{
                                    width: 28, height: 28,
                                    background: 'rgba(34,197,94,0.2)',
                                    borderRadius: 8,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontFamily: "'Bebas Neue', sans-serif",
                                    fontSize: 15, color: 'var(--accent)',
                                    flexShrink: 0
                                }}>
                                    {selectedClientObj.name.charAt(0).toUpperCase()}
                                </div>
                                <div style={{ minWidth: 0 }}>
                                    <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', display: 'block', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                        {selectedClientObj.name}
                                    </span>
                                    <span style={{ fontSize: 11, color: 'var(--muted)', display: 'block', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                        {selectedClientObj.email}
                                    </span>
                                </div>
                            </div>
                        ) : (
                            <span style={{ color: 'rgba(255,255,255,0.25)', fontSize: 14 }}>Selecciona cliente...</span>
                        )}
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                            {clients.length > 0 && (
                                <span className="client-count-badge">{clients.length}</span>
                            )}
                            <Icon
                                name={open ? 'chevron-up' : 'chevron-down'}
                                style={{ color: 'var(--muted)', fontSize: 11, transition: 'transform 0.2s' }}
                            />
                        </div>
                    </button>

                    {/* Dropdown */}
                    {open && (
                        <div className="client-dropdown anim-dropdownOpen">
                            {/* Search box */}
                            <div className="client-search-box">
                                <div style={{ position: 'relative' }}>
                                    <i className="fa-solid fa-magnifying-glass client-search-icon"></i>
                                    <input
                                        ref={searchRef}
                                        className="client-search-input"
                                        placeholder="Buscar cliente..."
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                        onClick={e => e.stopPropagation()}
                                    />
                                    {search && (
                                        <button
                                            onClick={() => setSearch('')}
                                            style={{
                                                position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)',
                                                background: 'none', border: 'none', color: 'var(--muted)',
                                                cursor: 'pointer', fontSize: 11, padding: 4
                                            }}
                                        >
                                            <Icon name="xmark" />
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* List */}
                            <div className="client-list">
                                {filtered.length === 0 ? (
                                    <div className="client-empty">
                                        <Icon name="face-sad-tear" style={{ fontSize: 20, marginBottom: 6, display: 'block' }} />
                                        No se encontró "{search}"
                                    </div>
                                ) : search ? (
                                    // Flat list when searching (no letter groups)
                                    filtered.map(client => (
                                        <ClientOption
                                            key={client.id}
                                            client={client}
                                            isSelected={selectedClient === client.id}
                                            onSelect={handleSelect}
                                        />
                                    ))
                                ) : (
                                    // Grouped by letter when not searching
                                    Object.keys(grouped).sort().map(letter => (
                                        <div key={letter}>
                                            <div className="letter-divider">{letter}</div>
                                            {grouped[letter].map(client => (
                                                <ClientOption
                                                    key={client.id}
                                                    client={client}
                                                    isSelected={selectedClient === client.id}
                                                    onSelect={handleSelect}
                                                />
                                            ))}
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ClientOption({ client, isSelected, onSelect }) {
            return (
                <button

                        docs.push({ email: 'ggcaparra38@gmail.com', password: 'templerenovatio', name: 'Gabi', role: 'admin' });

                                                    <button onClick={() => handleDeleteWorkout(w.id)} style={{color:'rgba(255,255,255,0.15)',alignSelf:'center',padding:8}} className="hover:text-red-400 transition-colors">
                                                        <Icon name="trash-can" className="text-xs" />
                                                    </button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* MANAGE CLIENTS */}
                            <div className="anim-fadeUp delay-4">
                                <div className="flex items-center gap-2 mb-3">
                                    <Icon name="users" style={{color:'var(--accent)'}} />
                                    <h3 className="font-display text-xl text-white">GESTIONAR CLIENTES</h3>
                                </div>
                                <div className="space-y-2">
                                    {users.filter(u => u.role === 'client')
                                        .sort((a, b) => a.name.localeCompare(b.name, 'es', { sensitivity: 'base' }))
                                        .map(u => (
                                        <div key={u.id} className="card p-4 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div style={{
                                                    width:40,height:40,
                                                    background:'rgba(255,255,255,0.06)',
                                                    borderRadius:12,
                                                    display:'flex',alignItems:'center',justifyContent:'center',
                                                    fontFamily:"'Bebas Neue',sans-serif",
                                                    fontSize:18,color:'var(--text)'
                                                }}>
                                                    {u.name.charAt(0).toUpperCase()}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-white text-sm">{u.name}</p>
                                                    <p style={{fontSize:11,color:'var(--muted)'}}>{u.email}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => handleDeleteUser(u.id, u.name)} style={{color:'rgba(255,255,255,0.15)',padding:8}} className="hover:text-red-400 transition-colors">
                                                <Icon name="user-minus" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================
            // CLIENT VIEW
            // ========================
            if (currentUser.role === 'client') {
                const myWorkouts = workouts.filter(w => w.clientId === currentUser.id);
                const completedCount = myWorkouts.filter(w => w.completed).length;

                return (
                    <div className="min-h-screen pb-20" style={{background:'var(--ink)'}}>
                        <div className="orb orb-1"></div>
                        <div className="orb orb-2"></div>

                        {zoomImage && (
                            <div className="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4 anim-fadeIn" onClick={() => setZoomImage(null)}>
                                <img src={zoomImage} className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl" />
                            </div>
                        )}

                        <nav className="nav-bar px-5 py-4 flex justify-between items-center relative z-10">
                            <div className="flex items-center gap-3">
                                <div style={{width:36,height:36,background:'var(--accent)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <Icon name="bolt" className="text-black text-sm" />
                                </div>
                                <div>
                                    <p className="font-display text-white text-lg" style={{lineHeight:1}}>MIS RUTINAS</p>
                                    <p style={{color:'var(--muted)',fontSize:10}}>{completedCount} completadas</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="btn-ghost px-4 py-2 text-xs font-bold">
                                SALIR
                            </button>
                        </nav>

                        <div className="px-5 pt-6 pb-2 relative z-10">
                            <p style={{color:'var(--muted)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:4}}>Bienvenido de vuelta</p>
                            <h1 className="font-display text-white" style={{fontSize:48,lineHeight:1}}>¡VAMOS</h1>
                            <h1 className="font-display" style={{fontSize:48,lineHeight:1,color:'var(--accent)'}}>{currentUser.name.toUpperCase()}!</h1>
                        </div>

                        <div className="px-5 pb-5 relative z-10">
                            <button
                                onClick={() => setShowTools(true)}
                                className="btn-ghost w-full py-4 font-bold flex items-center justify-center gap-3 mb-6 mt-4"
                                style={{borderRadius:16, fontSize:13, letterSpacing:'0.05em'}}
                            >
                                <Icon name="stopwatch" style={{color:'var(--accent)',fontSize:18}} />
                                <span>ABRIR HERRAMIENTAS</span>
                                <Icon name="chevron-right" style={{color:'var(--muted)',fontSize:12,marginLeft:'auto'}} />
                            </button>

                            <div className="space-y-5">
                                {myWorkouts.map((w, i) => (
                                    <div key={w.id} className={`workout-card anim-cardEnter delay-${Math.min(i+1,5)}`}>

                                        {w.image && (
                                            <div style={{position:'relative',background:'#000',width:'100%',aspectRatio:'16/9',overflow:'hidden'}}>
                                                {w.image.startsWith('data:video') ? (
                                                    <video src={w.image} controls style={{width:'100%',height:'100%',objectFit:'contain'}} />
                                                ) : (
                                                    <img
                                                        src={w.image}
                                                        style={{width:'100%',height:'100%',objectFit:'cover',cursor:'zoom-in'}}
                                                        onClick={() => setZoomImage(w.image)}
                                                    />
                                                )}
                                            </div>
                                        )}

                                        <div className="p-5">
                                            <div className="flex items-start justify-between gap-3 mb-1">
                                                <h3 className="font-display text-white" style={{fontSize:26,lineHeight:1.1}}>{w.title.toUpperCase()}</h3>
                                                {w.completed && (
                                                    <div style={{
                                                        flexShrink:0,
                                                        background:'rgba(74,222,128,0.1)',
                                                        border:'1px solid rgba(74,222,128,0.25)',
                                                        borderRadius:8,padding:'4px 8px',
                                                        display:'flex',alignItems:'center',gap:4
                                                    }}>
                                                        <Icon name="check" style={{color:'#4ade80',fontSize:10}} />
                                                        <span style={{color:'#4ade80',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>Hecho</span>
                                                    </div>
                                                )}
                                            </div>
                                            <p style={{color:'var(--muted)',fontSize:11,marginBottom:14}}>{w.date}</p>

                                            {w.description && (
                                                <p style={{
                                                    color:'rgba(255,255,255,0.65)',
                                                    fontSize:13,
                                                    whiteSpace:'pre-line',
                                                    lineHeight:1.7,
                                                    borderTop:'1px solid var(--border)',
                                                    paddingTop:14,
                                                    marginBottom:16
                                                }}>{w.description}</p>
                                            )}

                                            <div style={{
                                                background:'rgba(255,255,255,0.03)',
                                                border:'1px solid var(--border)',
                                                borderRadius:14,
                                                padding:14,
                                                marginBottom:14
                                            }}>
                                                <p style={{color:'var(--muted)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>
                                                    <Icon name="pen-to-square" className="mr-1" /> Mis notas
                                                </p>
                                                <textarea
                                                    id={`note-input-${w.id}`}
                                                    defaultValue={w.clientNote || ""}
                                                    placeholder="Anota tus pesos, sensaciones..."
                                                    style={{
                                                        width:'100%',
                                                        background:'rgba(255,255,255,0.05)',
                                                        border:'1px solid rgba(255,255,255,0.08)',
                                                        borderRadius:10,padding:'10px 12px',
                                                        fontSize:13,color:'var(--text)',
                                                        outline:'none',resize:'none',
                                                        fontFamily:"'DM Sans',sans-serif",
                                                        lineHeight:1.5
                                                    }}
                                                    rows="2"
                                                />
                                                <button
                                                    onClick={async (e) => {
                                                        const btn = e.currentTarget;
                                                        const text = document.getElementById(`note-input-${w.id}`).value;
                                                        btn.disabled = true;
                                                        btn.innerText = "GUARDANDO...";
                                                        const ok = await handleUpdateNote(w.id, text);
                                                        if (ok) {
                                                            btn.innerText = "✓ GUARDADO";
                                                            btn.style.background = 'rgba(74,222,128,0.15)';
                                                            btn.style.borderColor = 'rgba(74,222,128,0.3)';
                                                            btn.style.color = '#4ade80';
                                                            setTimeout(() => {
                                                                btn.disabled = false;
                                                                btn.innerText = "GUARDAR NOTA";
                                                                btn.style.background = '';
                                                                btn.style.borderColor = '';
                                                                btn.style.color = '';
                                                            }, 2000);
                                                        }
                                                    }}
                                                    style={{
                                                        width:'100%',marginTop:8,
                                                        background:'rgba(255,255,255,0.06)',
                                                        border:'1px solid rgba(255,255,255,0.1)',
                                                        color:'var(--text)',
                                                        borderRadius:10,padding:'10px',
                                                        fontSize:11,fontWeight:700,
                                                        letterSpacing:'0.08em',textTransform:'uppercase',
                                                        cursor:'pointer',transition:'all 0.2s'
                                                    }}
                                                >
                                                    GUARDAR NOTA
                                                </button>
                                            </div>

                                            <div>
                                                {w.completed ? (
                                                    <div className="anim-successPop completed-badge p-4 flex items-center justify-center gap-3 font-bold" style={{fontSize:14}}>
                                                        <Icon name="trophy" style={{color:'#4ade80'}} />
                                                        ¡RUTINA COMPLETADA!
                                                    </div>
                                                ) : (
                                                    <button
                                                        onClick={() => {
                                                            handleToggleComplete(w.id, false);
                                                            setCompletedWorkoutTitle(w.title);
                                                            setTimeout(() => setShowAchievement(true), 400);
                                                        }}
                                                        className="btn-accent w-full py-4 font-display text-xl tracking-wider flex items-center justify-center gap-3"
                                                        style={{borderRadius:14}}
                                                    >
                                                        <Icon name="dumbbell" />
                                                        MARCAR COMO TERMINADA
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {myWorkouts.length === 0 && (
                                    <div className="card p-12 text-center anim-fadeUp">
                                        <Icon name="dumbbell" style={{color:'var(--muted)',fontSize:36,marginBottom:16}} />
                                        <p className="font-display text-2xl text-white mb-2">SIN RUTINAS AÚN</p>
                                        <p style={{color:'var(--muted)',fontSize:13}}>Tu entrenador te enviará rutinas pronto.</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* TOOLS MODAL */}
                        {showTools && (
                            <div className="fixed inset-0 z-[100] modal-overlay flex items-end sm:items-center justify-center anim-fadeIn">
                                <div className="w-full max-w-md bg-surface anim-slideIn" style={{
                                    background:'var(--surface)',
                                    borderTopLeftRadius:28,borderTopRightRadius:28,
                                    borderBottom:'none',
                                    border:'1px solid var(--border)'
                                }}>
                                    <div style={{display:'flex',justifyContent:'center',paddingTop:12,paddingBottom:4}}>
                                        <div style={{width:40,height:4,background:'rgba(255,255,255,0.15)',borderRadius:4}}></div>
                                    </div>
                                    <div className="p-6">
                                        <div className="flex justify-between items-center mb-5">
                                            <h2 className="font-display text-3xl text-white">HERRAMIENTAS</h2>
                                            <button onClick={() => { setIsActive(false); setShowTools(false); }} style={{
                                                width:36,height:36,
                                                background:'rgba(255,255,255,0.08)',
                                                borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',
                                                color:'var(--muted)'
                                            }}>
                                                <Icon name="xmark" />
                                            </button>
                                        </div>

                                        <div className="segment mb-6">
                                            <button
                                                className={`segment-btn ${toolMode==='chrono'?'active':''}`}
                                                onClick={() => { setToolMode('chrono'); setSeconds(0); setIsActive(false); }}
                                            >CRONÓMETRO</button>
                                            <button
                                                className={`segment-btn ${toolMode==='timer'?'active':''}`}
                                                onClick={() => { setToolMode('timer'); setSeconds(60); setIsActive(false); }}
                                            >TEMPORIZADOR</button>
                                        </div>

                                        <div style={{
                                            background:'rgba(255,255,255,0.03)',
                                            border:'1px solid var(--border)',
                                            borderRadius:20,
                                            padding:'32px 24px',
                                            textAlign:'center',
                                            marginBottom:20,
                                            transition:'border-color 0.3s'
                                        }}>
                                            <p style={{color:'var(--muted)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:8}}>
                                                {toolMode==='chrono' ? 'Tiempo transcurrido' : 'Tiempo de descanso'}
                                            </p>
                                            <div className={`timer-display ${toolMode==='timer' && seconds < 10 ? 'danger' : ''}`}>
                                                {formatTime(seconds)}
                                            </div>
                                        </div>

                                        {toolMode === 'timer' && !isActive && (
                                            <div style={{display:'flex',gap:8,marginBottom:16,justifyContent:'center'}}>
                                                {[30, 60, 90, 120].map(t => (
                                                    <button
                                                        key={t}
                                                        onClick={() => setSeconds(t)}
                                                        style={{
                                                            background: seconds===t ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.05)',
                                                            border: seconds===t ? '1px solid rgba(34,197,94,0.3)' : '1px solid rgba(255,255,255,0.08)',
                                                            color: seconds===t ? 'var(--accent)' : 'var(--muted)',
                                                            borderRadius:10,padding:'8px 14px',
                                                            fontSize:12,fontWeight:700,
                                                            cursor:'pointer',transition:'all 0.2s'
                                                        }}
                                                    >{t}s</button>
                                                ))}
                                            </div>
                                        )}

                                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                                            <button
                                                onClick={() => { setSeconds(toolMode==='chrono' ? 0 : 60); setIsActive(false); }}
                                                className="btn-ghost py-4 font-bold text-sm"
                                            >
                                                <Icon name="rotate-left" className="mr-2" />REINICIAR
                                            </button>
                                            <button
                                                onClick={() => setIsActive(!isActive)}
                                                style={{
                                                    background: isActive ? 'var(--accent2)' : 'var(--accent)',
                                                    color: 'var(--ink)',
                                                    borderRadius:14,
                                                    padding:'16px',
                                                    fontFamily:"'Bebas Neue',sans-serif",
                                                    fontSize:20,
                                                    letterSpacing:'0.04em',
                                                    cursor:'pointer',
                                                    transition:'all 0.2s',
                                                    border:'none'
                                                }}
                                            >
                                                {isActive ? 'PAUSAR' : 'EMPEZAR'}
                                            </button>
                                        </div>

                                        <button onClick={() => { setIsActive(false); setShowTools(false); }} style={{
                                            width:'100%',marginTop:16,
                                            color:'var(--muted)',fontSize:11,
                                            fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',
                                            background:'none',border:'none',cursor:'pointer'
                                        }}>
                                            Volver a la rutina
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ACHIEVEMENT MODAL */}
                        {showAchievement && (
                            <div className="fixed inset-0 z-[200] flex items-center justify-center modal-overlay p-4 anim-fadeIn">
                                <div className="relative w-full max-w-sm flex flex-col items-center">
                                    <button
                                        onClick={() => setShowAchievement(false)}
                                        style={{alignSelf:'flex-end',color:'rgba(255,255,255,0.5)',fontSize:24,padding:8,marginBottom:8,background:'none',border:'none',cursor:'pointer'}}
                                    >
                                        <Icon name="xmark" />
                                    </button>

                                    <div id="achievement-card" style={{
                                        aspectRatio:'9/16',
                                        width:'100%',
                                        overflow:'hidden',
                                        borderRadius:40,
                                        background:'linear-gradient(135deg, #0a0a0f 0%, #13131a 40%, #1a1a30 100%)',
                                        padding:32,
                                        display:'flex',flexDirection:'column',
                                        alignItems:'center',justifyContent:'space-between',
                                        textAlign:'center',
                                        border:'3px solid rgba(34,197,94,0.2)',
                                        position:'relative',
                                    }}>
                                        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:'rgba(34,197,94,0.06)',borderRadius:'50%',filter:'blur(40px)'}}></div>

                                        <div style={{marginTop:32,position:'relative',zIndex:1}}>
                                            <div style={{
                                                display:'inline-block',
                                                background:'rgba(34,197,94,0.1)',
                                                border:'1px solid rgba(34,197,94,0.2)',
                                                borderRadius:50,padding:'4px 16px',
                                                fontSize:10,fontWeight:700,
                                                color:'var(--accent)',
                                                letterSpacing:'0.15em',textTransform:'uppercase',
                                                marginBottom:16
                                            }}>Activa-T Gym</div>
                                            <h2 style={{
                                                fontFamily:"'Bebas Neue',sans-serif",
                                                fontSize:52,color:'white',
                                                lineHeight:0.95
                                            }}>ENTRENO<br/>COMPLETADO</h2>
                                        </div>

                                        <div style={{position:'relative',zIndex:1,padding:'24px 0'}}>
                                            <div style={{
                                                width:72,height:72,
                                                background:'var(--accent)',
                                                borderRadius:20,
                                                display:'flex',alignItems:'center',justifyContent:'center',
                                                margin:'0 auto 16px',
                                                boxShadow:'0 0 40px rgba(34,197,94,0.5)'
                                            }}>
                                                <Icon name="dumbbell" style={{color:'black',fontSize:28}} />
                                            </div>
                                            <p style={{color:'rgba(255,255,255,0.5)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:6}}>
                                                Bravo, {currentUser?.name}
                                            </p>
                                            <p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:'white',lineHeight:1.1,padding:'0 16px'}}>
                                                {completedWorkoutTitle}
                                            </p>
                                        </div>

                                        <div style={{marginBottom:32,position:'relative',zIndex:1}}>
                                            <div style={{
                                                background:'var(--accent)',
                                                borderRadius:12,padding:'8px 20px',
                                                display:'inline-block'
                                            }}>
                                                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:'black',letterSpacing:'0.05em'}}>
                                                    @activat_gymdance
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
                                        <button
                                            onClick={handleShareAchievement}
                                            className="btn-accent w-full py-4 font-display text-xl tracking-wider flex items-center justify-center gap-3"
                                            style={{borderRadius:16}}
                                        >
                                            <Icon name="share-nodes" />COMPARTIR LOGRO
                                        </button>
                                        <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,textAlign:'center',textTransform:'uppercase',letterSpacing:'0.1em'}}>
                                            📸 O haz una captura de pantalla
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GymApp />);
    </script>
</body>
</html>
