<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa-T Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0f;
            --ink2: #13131a;
            --surface: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --accent: #22c55e;
            --accent2: #16a34a;
            --muted: rgba(255,255,255,0.35);
            --text: #f0f0f5;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--ink);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

        /* ---- NOISE OVERLAY ---- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ---- GLOW ORB ---- */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(34,197,94,0.07); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(22,163,74,0.06); bottom: 100px; left: -80px; }

        /* ---- ANIMATIONS ---- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes loading-bar {
            0% { left: -40%; }
            50% { left: 40%; }
            100% { left: 110%; }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes card-enter {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes success-pop {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .anim-fadeUp { animation: fadeUp 0.5s ease forwards; }
        .anim-fadeIn { animation: fadeIn 0.4s ease forwards; }
        .anim-slideIn { animation: slideInBottom 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
        .anim-cardEnter { animation: card-enter 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
        .anim-successPop { animation: success-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        /* ---- CARDS ---- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .card-glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }

        /* ---- ACCENT BUTTON ---- */
        .btn-accent {
            background: var(--accent);
            color: var(--ink);
            font-weight: 700;
            border-radius: 14px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-accent::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-accent:active { transform: scale(0.97); }
        .btn-accent:hover::after { opacity: 1; }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 14px;
            transition: all 0.2s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-ghost:active { transform: scale(0.97); }

        /* ---- INPUT ---- */
        .input-dark {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .input-dark::placeholder { color: rgba(255,255,255,0.25); }
        .input-dark:focus {
            border-color: var(--accent);
            background: rgba(34,197,94,0.04);
        }

        /* ---- NAV ---- */
        .nav-bar {
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        /* ---- TAG ---- */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.1);
            color: var(--accent);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ---- WORKOUT CARD ---- */
        .workout-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .workout-card:hover { transform: translateY(-2px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

        /* ---- TICKER ---- */
        .ticker-wrap {
            overflow: hidden;
            background: var(--accent);
            padding: 8px 0;
        }
        .ticker-inner {
            display: flex;
            white-space: nowrap;
            animation: ticker 18s linear infinite;
        }
        .ticker-item {
            color: var(--ink);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.1em;
            padding: 0 24px;
        }

        /* ---- ACTIVITY ROW ---- */
        .activity-row {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .activity-row:last-child { border-bottom: none; }
        .activity-row:hover { background: rgba(255,255,255,0.02); }

        /* ---- PULSE DOT ---- */
        .pulse-dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            position: relative;
        }
        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        /* ---- SELECT ---- */
        select.input-dark option {
            background: #1a1a24;
            color: #f0f0f5;
        }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* ---- COMPLETED BADGE ---- */
        .completed-badge {
            background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(74,222,128,0.05));
            border: 1px solid rgba(74,222,128,0.3);
            color: #4ade80;
            border-radius: 14px;
        }

        /* ---- MODAL OVERLAY ---- */
        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
        }

        /* ---- SEGMENT CONTROL ---- */
        .segment {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
            display: flex;
        }
        .segment-btn {
            flex: 1;
            padding: 8px;
            border-radius: 9px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.2s;
            color: rgba(255,255,255,0.4);
        }
        .segment-btn.active {
            background: var(--accent);
            color: var(--ink);
        }

        /* ---- TIMER DISPLAY ---- */
        .timer-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 80px;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--text);
        }
        .timer-display.danger { color: #f87171; }

        /* ---- STAGGER DELAYS ---- */
        .delay-1 { animation-delay: 0.05s; animation-fill-mode: both; }
        .delay-2 { animation-delay: 0.1s; animation-fill-mode: both; }
        .delay-3 { animation-delay: 0.15s; animation-fill-mode: both; }
        .delay-4 { animation-delay: 0.2s; animation-fill-mode: both; }
        .delay-5 { animation-delay: 0.25s; animation-fill-mode: both; }

        /* ---- LOGIN BG ---- */
        .login-bg {
            background: radial-gradient(ellipse at 80% 0%, rgba(34,197,94,0.1) 0%, transparent 60%),
                        radial-gradient(ellipse at 0% 100%, rgba(22,163,74,0.08) 0%, transparent 50%),
                        var(--ink);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <div id="install-banner" style="display: none;" class="fixed bottom-4 left-4 right-4 z-50">
        <div class="card-glass p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center" style="background:var(--accent)">
                    <i class="fa-solid fa-mobile-screen-button text-black"></i>
                </div>
                <div>
                    <p class="font-bold text-sm text-white">Instalar Activa-T Gym</p>
                    <p class="text-xs" style="color:var(--muted)">Acceso rápido desde tu menú</p>
                </div>
            </div>
            <button id="install-button" class="btn-accent px-4 py-2 text-xs">INSTALAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        window.doc = doc;
        window.setDoc = setDoc;
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVT1Mx8dbizJ9nXBIXJcIWjcof_b0fsec",
            authDomain: "activa-t-aea86.firebaseapp.com",
            projectId: "activa-t-aea86",
            storageBucket: "activa-t-aea86.firebasestorage.app",
            messagingSenderId: "180811299847",
            appId: "1:180811299847:web:9ba9668e41ab998f47fea2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        window.db = db;
        window.auth = auth;
        window.storage = storage;
        window.storageApi = { ref, uploadBytesResumable, getDownloadURL };
        window.firestore = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc };
        window.firebaseAuth = { onAuthStateChanged, signOut };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`}></i>
        );

        function ClientPicker({ users, selectedClient, onSelect }) {
            const [search, setSearch] = React.useState('');
            const [open, setOpen] = React.useState(false);
            const wrapperRef = React.useRef(null);

            // Cierra el dropdown al hacer clic fuera
            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
                        setOpen(false);
                        setSearch('');
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const clients = users
                .filter(u => u.role === 'client')
                .sort((a, b) => a.name.localeCompare(b.name, 'es', { sensitivity: 'base' }));

            const filtered = clients.filter(c =>
                c.name.toLowerCase().includes(search.toLowerCase()) ||
                c.email.toLowerCase().includes(search.toLowerCase())
            );

            const selected = clients.find(c => c.id === selectedClient);

            return (
                <div ref={wrapperRef} style={{position:'relative'}}>
                    {/* Trigger */}
                    <div
                        onClick={() => { setOpen(!open); setSearch(''); }}
                        style={{
                            background:'rgba(255,255,255,0.05)',
                            border: open ? '1px solid var(--accent)' : '1px solid rgba(255,255,255,0.1)',
                            borderRadius:12, padding:'13px 16px',
                            cursor:'pointer', display:'flex',
                            alignItems:'center', justifyContent:'space-between',
                            transition:'border-color 0.2s, box-shadow 0.2s',
                            boxShadow: open ? '0 0 0 3px rgba(34,197,94,0.1)' : 'none'
                        }}
                    >
                        <div style={{display:'flex', alignItems:'center', gap:10}}>
                            {selected ? (
                                <>
                                    <div style={{
                                        width:30, height:30, background:'var(--accent)',
                                        borderRadius:9, display:'flex', alignItems:'center', justifyContent:'center',
                                        fontFamily:"'Bebas Neue',sans-serif", fontSize:15, color:'black', flexShrink:0
                                    }}>{selected.name.charAt(0).toUpperCase()}</div>
                                    <div>
                                        <p style={{color:'var(--text)', fontSize:13, fontWeight:600, lineHeight:1.2}}>{selected.name}</p>
                                        <p style={{color:'rgba(255,255,255,0.3)', fontSize:11}}>{selected.email}</p>
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div style={{
                                        width:30, height:30, background:'rgba(255,255,255,0.06)',
                                        borderRadius:9, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
                                    }}>
                                        <i className="fa-solid fa-user" style={{color:'rgba(255,255,255,0.25)', fontSize:12}}></i>
                                    </div>
                                    <span style={{color:'rgba(255,255,255,0.3)', fontSize:13}}>Selecciona cliente...</span>
                                </>
                            )}
                        </div>
                        <i className={`fa-solid fa-chevron-${open ? 'up' : 'down'}`} style={{color:'rgba(255,255,255,0.3)',fontSize:11,transition:'transform 0.2s'}}></i>
                    </div>

                    {/* Dropdown */}
                    {open && (
                        <div style={{
                            position:'absolute', top:'calc(100% + 8px)', left:0, right:0,
                            background:'#1a1a24', border:'1px solid rgba(255,255,255,0.1)',
                            borderRadius:16, zIndex:300, overflow:'hidden',
                            boxShadow:'0 24px 60px rgba(0,0,0,0.6)',
                            animation:'fadeUp 0.15s ease forwards'
                        }}>
                            {/* Search */}
                            <div style={{padding:'12px 12px 8px', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                                <div style={{position:'relative'}}>
                                    <i className="fa-solid fa-magnifying-glass" style={{
                                        position:'absolute', left:11, top:'50%',
                                        transform:'translateY(-50%)',
                                        color:'rgba(255,255,255,0.25)', fontSize:12, pointerEvents:'none'
                                    }}></i>
                                    <input
                                        autoFocus
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                        placeholder="Buscar por nombre o email..."
                                        style={{
                                            width:'100%', background:'rgba(255,255,255,0.05)',
                                            border:'1px solid rgba(255,255,255,0.08)',
                                            borderRadius:9, padding:'9px 10px 9px 30px',
                                            fontSize:13, color:'var(--text)',
                                            outline:'none', fontFamily:"'DM Sans',sans-serif"
                                        }}
                                    />
                                </div>
                            </div>

                            {/* Count */}
                            <div style={{padding:'6px 16px 4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <span style={{fontSize:10, color:'rgba(255,255,255,0.2)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em'}}>
                                    {search ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}` : `${clients.length} clientes · A→Z`}
                                </span>
                            </div>

                            {/* List */}
                            <div style={{maxHeight:240, overflowY:'auto'}}>
                                {filtered.length === 0 ? (
                                    <div style={{padding:'20px', textAlign:'center'}}>
                                        <i className="fa-solid fa-face-frown" style={{color:'rgba(255,255,255,0.15)', fontSize:20, marginBottom:8, display:'block'}}></i>
                                        <p style={{color:'rgba(255,255,255,0.3)', fontSize:13}}>Sin resultados para "{search}"</p>
                                    </div>
                                ) : filtered.map((c, i) => (
                                    <div
                                        key={c.id}
                                        onClick={() => { onSelect(c.id); setOpen(false); setSearch(''); }}
                                        style={{
                                            padding:'11px 16px', cursor:'pointer',
                                            display:'flex', alignItems:'center', gap:12,
                                            background: c.id === selectedClient ? 'rgba(34,197,94,0.08)' : 'transparent',
                                            borderBottom: i < filtered.length-1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
                                            transition:'background 0.12s'
                                        }}
                                        onMouseEnter={e => { if(c.id !== selectedClient) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
                                        onMouseLeave={e => { e.currentTarget.style.background = c.id === selectedClient ? 'rgba(34,197,94,0.08)' : 'transparent'; }}
                                    >
                                        <div style={{
                                            width:34, height:34, borderRadius:10, flexShrink:0,
                                            background: c.id === selectedClient ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.06)',
                                            border: c.id === selectedClient ? '1px solid rgba(34,197,94,0.3)' : '1px solid rgba(255,255,255,0.06)',
                                            display:'flex', alignItems:'center', justifyContent:'center',
                                            fontFamily:"'Bebas Neue',sans-serif", fontSize:17,
                                            color: c.id === selectedClient ? 'var(--accent)' : 'rgba(255,255,255,0.5)'
                                        }}>
                                            {c.name.charAt(0).toUpperCase()}
                                        </div>
                                        <div style={{flex:1, minWidth:0}}>
                                            <p style={{fontSize:13, fontWeight:600, color: c.id === selectedClient ? 'var(--accent)' : 'var(--text)', lineHeight:1.3}}>{c.name}</p>
                                            <p style={{fontSize:11, color:'rgba(255,255,255,0.25)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{c.email}</p>
                                        </div>
                                        {c.id === selectedClient && (
                                            <div style={{
                                                width:20, height:20, borderRadius:6, flexShrink:0,
                                                background:'rgba(34,197,94,0.15)',
                                                display:'flex', alignItems:'center', justifyContent:'center'
                                            }}>
                                                <i className="fa-solid fa-check" style={{color:'var(--accent)', fontSize:10}}></i>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function GymApp() {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [workouts, setWorkouts] = useState([]);
            const [view, setView] = useState('login');
            const [formData, setFormData] = useState({ email: '', password: '', name: '' });
            const [workoutData, setWorkoutData] = useState({ title: '', description: '', image: null });
            const [selectedClient, setSelectedClient] = useState('');
            const [zoomImage, setZoomImage] = useState(null);
            const [loading, setLoading] = useState(true);
            const [file, setFile] = useState(null);
            const [showTools, setShowTools] = useState(false);
            const [seconds, setSeconds] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [toolMode, setToolMode] = useState('chrono');
            const [showAchievement, setShowAchievement] = useState(false);
            const [completedWorkoutTitle, setCompletedWorkoutTitle] = useState('');
            const [activitiesLimit, setActivitiesLimit] = useState(5);
            const [clientSearch, setClientSearch] = useState('');
            const [uploadProgress, setUploadProgress] = useState(null);
            const intervalRef = useRef(null);

            // Timer logic
            useEffect(() => {
                if (isActive) {
                    intervalRef.current = setInterval(() => {
                        setSeconds(s => {
                            if (toolMode === 'timer') {
                                if (s <= 1) { setIsActive(false); return 0; }
                                return s - 1;
                            }
                            return s + 1;
                        });
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isActive, toolMode]);

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            };

            const handleUpdateNote = async (workoutId, noteText) => {
                try {
                    const workoutRef = window.firestore.doc(window.db, 'rutinas', workoutId);
                    if (window.firestore.updateDoc) {
                        await window.firestore.updateDoc(workoutRef, { clientNote: noteText });
                    } else {

                            <div className="space-y-2">
                                {users.filter(u => u.role === 'client').map(u => (
                                    <div key={u.id} className="card p-4 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div style={{
                                                width:40,height:40,
                                                background:'rgba(255,255,255,0.06)',
                                                borderRadius:12,
                                                display:'flex',alignItems:'center',justifyContent:'center',
                                                fontFamily:"'Bebas Neue',sans-serif",
                                                fontSize:18,color:'var(--text)'
                                            }}>
                                                {u.name.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <p className="font-bold text-white text-sm">{u.name}</p>
                                                <p style={{fontSize:11,color:'var(--muted)'}}>{u.email}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => handleDeleteUser(u.id, u.name)} style={{color:'rgba(255,255,255,0.15)',padding:8}} className="hover:text-red-400 transition-colors">
                                            <Icon name="user-minus" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ========================
            // CLIENT VIEW
            // ========================
            if (currentUser.role === 'client') {
                const myWorkouts = workouts.filter(w => w.clientId === currentUser.id);
                const completedCount = myWorkouts.filter(w => w.completed).length;

                return (
                    <div className="min-h-screen pb-20" style={{background:'var(--ink)'}}>
                        <div className="orb orb-1"></div>
                        <div className="orb orb-2"></div>

                        {/* ZOOM IMAGE MODAL */}
                        {zoomImage && (
                            <div className="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4 anim-fadeIn" onClick={() => setZoomImage(null)}>
                                <img src={zoomImage} className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl" />
                            </div>
                        )}

                        {/* NAV */}
                        <nav className="nav-bar px-5 py-4 flex justify-between items-center relative z-10">
                            <div className="flex items-center gap-3">
                                <div style={{width:36,height:36,background:'var(--accent)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <Icon name="bolt" className="text-black text-sm" />
                                </div>
                                <div>
                                    <p className="font-display text-white text-lg" style={{lineHeight:1}}>MIS RUTINAS</p>
                                    <p style={{color:'var(--muted)',fontSize:10}}>{completedCount} completadas</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="btn-ghost px-4 py-2 text-xs font-bold">
                                SALIR
                            </button>
                        </nav>

                        {/* HERO HEADER */}
                        <div className="px-5 pt-6 pb-2 relative z-10">
                            <p style={{color:'var(--muted)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:4}}>Bienvenido de vuelta</p>
                            <h1 className="font-display text-white" style={{fontSize:48,lineHeight:1}}>¡VAMOS</h1>
                            <h1 className="font-display" style={{fontSize:48,lineHeight:1,color:'var(--accent)'}}>{currentUser.name.toUpperCase()}!</h1>
                        </div>

                        <div className="px-5 pb-5 relative z-10">
                            {/* TOOLS BUTTON */}
                            <button
                                onClick={() => setShowTools(true)}
                                className="btn-ghost w-full py-4 font-bold flex items-center justify-center gap-3 mb-6 mt-4"
                                style={{borderRadius:16, fontSize:13, letterSpacing:'0.05em'}}
                            >
                                <Icon name="stopwatch" style={{color:'var(--accent)',fontSize:18}} />
                                <span>ABRIR HERRAMIENTAS</span>
                                <Icon name="chevron-right" style={{color:'var(--muted)',fontSize:12,marginLeft:'auto'}} />
                            </button>

                            {/* WORKOUT CARDS */}
                            <div className="space-y-5">
                                {myWorkouts.map((w, i) => (
                                    <div key={w.id} className={`workout-card anim-cardEnter delay-${Math.min(i+1,5)}`}>

                                        {/* Media */}
                                        {w.image && (
                                            <div style={{position:'relative',background:'#000',width:'100%',aspectRatio:'16/9',overflow:'hidden'}}>
                                                {w.image.startsWith('data:video') ? (
                                                    <video src={w.image} controls style={{width:'100%',height:'100%',objectFit:'contain'}} />
                                                ) : (
                                                    <img
                                                        src={w.image}
                                                        style={{width:'100%',height:'100%',objectFit:'cover',cursor:'zoom-in'}}
                                                        onClick={() => setZoomImage(w.image)}
                                                    />
                                                )}
                                            </div>
                                        )}

                                        <div className="p-5">
                                            {/* Title row */}
                                            <div className="flex items-start justify-between gap-3 mb-1">
                                                <h3 className="font-display text-white" style={{fontSize:26,lineHeight:1.1}}>{w.title.toUpperCase()}</h3>
                                                {w.completed && (
                                                    <div style={{
                                                        flexShrink:0,
                                                        background:'rgba(74,222,128,0.1)',
                                                        border:'1px solid rgba(74,222,128,0.25)',
                                                        borderRadius:8,padding:'4px 8px',
                                                        display:'flex',alignItems:'center',gap:4
                                                    }}>
                                                        <Icon name="check" style={{color:'#4ade80',fontSize:10}} />
                                                        <span style={{color:'#4ade80',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>Hecho</span>
                                                    </div>
                                                )}
                                            </div>
                                            <p style={{color:'var(--muted)',fontSize:11,marginBottom:14}}>{w.date}</p>

                                            {/* Description */}
                                            {w.description && (
                                                <p style={{
                                                    color:'rgba(255,255,255,0.65)',
                                                    fontSize:13,
                                                    whiteSpace:'pre-line',
                                                    lineHeight:1.7,
                                                    borderTop:'1px solid var(--border)',
                                                    paddingTop:14,
                                                    marginBottom:16
                                                }}>{w.description}</p>
                                            )}

                                            {/* NOTES */}
                                            <div style={{
                                                background:'rgba(255,255,255,0.03)',
                                                border:'1px solid var(--border)',
                                                borderRadius:14,
                                                padding:14,
                                                marginBottom:14
                                            }}>
                                                <p style={{color:'var(--muted)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>
                                                    <Icon name="pen-to-square" className="mr-1" /> Mis notas
                                                </p>
                                                <textarea
                                                    id={`note-input-${w.id}`}
                                                    defaultValue={w.clientNote || ""}
                                                    placeholder="Anota tus pesos, sensaciones..."
                                                    style={{
                                                        width:'100%',
                                                        background:'rgba(255,255,255,0.05)',
                                                        border:'1px solid rgba(255,255,255,0.08)',
                                                        borderRadius:10,padding:'10px 12px',
                                                        fontSize:13,color:'var(--text)',
                                                        outline:'none',resize:'none',
                                                        fontFamily:"'DM Sans',sans-serif",
                                                        lineHeight:1.5
                                                    }}
                                                    rows="2"
                                                />
                                                <button
                                                    onClick={async (e) => {
                                                        const btn = e.currentTarget;
                                                        const text = document.getElementById(`note-input-${w.id}`).value;
                                                        btn.disabled = true;
                                                        btn.innerText = "GUARDANDO...";
                                                        const ok = await handleUpdateNote(w.id, text);
                                                        if (ok) {
                                                            btn.innerText = "✓ GUARDADO";
                                                            btn.style.background = 'rgba(74,222,128,0.15)';
                                                            btn.style.borderColor = 'rgba(74,222,128,0.3)';
                                                            btn.style.color = '#4ade80';
                                                            setTimeout(() => {
                                                                btn.disabled = false;
                                                                btn.innerText = "GUARDAR NOTA";
                                                                btn.style.background = '';
                                                                btn.style.borderColor = '';
                                                                btn.style.color = '';
                                                            }, 2000);
                                                        }
                                                    }}
                                                    style={{
                                                        width:'100%',marginTop:8,
                                                        background:'rgba(255,255,255,0.06)',
                                                        border:'1px solid rgba(255,255,255,0.1)',
                                                        color:'var(--text)',
                                                        borderRadius:10,padding:'10px',
                                                        fontSize:11,fontWeight:700,
                                                        letterSpacing:'0.08em',textTransform:'uppercase',
                                                        cursor:'pointer',transition:'all 0.2s'
                                                    }}
                                                >
                                                    GUARDAR NOTA
                                                </button>
                                            </div>

                                            {/* COMPLETE BUTTON */}
                                            <div>
                                                {w.completed ? (
                                                    <div className="anim-successPop completed-badge p-4 flex items-center justify-center gap-3 font-bold" style={{fontSize:14}}>
                                                        <Icon name="trophy" style={{color:'#4ade80'}} />
                                                        ¡RUTINA COMPLETADA!
                                                    </div>
                                                ) : (
                                                    <button
                                                        onClick={() => {
                                                            handleToggleComplete(w.id, false);
                                                            setCompletedWorkoutTitle(w.title);
                                                            setTimeout(() => setShowAchievement(true), 400);
                                                        }}
                                                        className="btn-accent w-full py-4 font-display text-xl tracking-wider flex items-center justify-center gap-3"
                                                        style={{borderRadius:14}}
                                                    >
                                                        <Icon name="dumbbell" />
                                                        MARCAR COMO TERMINADA
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {myWorkouts.length === 0 && (
                                    <div className="card p-12 text-center anim-fadeUp">
                                        <Icon name="dumbbell" style={{color:'var(--muted)',fontSize:36,marginBottom:16}} />
                                        <p className="font-display text-2xl text-white mb-2">SIN RUTINAS AÚN</p>
                                        <p style={{color:'var(--muted)',fontSize:13}}>Tu entrenador te enviará rutinas pronto.</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* ---- TOOLS MODAL ---- */}
                        {showTools && (
                            <div className="fixed inset-0 z-[100] modal-overlay flex items-end sm:items-center justify-center anim-fadeIn">
                                <div className="w-full max-w-md bg-surface anim-slideIn" style={{
                                    background:'var(--surface)',
                                    borderTopLeftRadius:28,borderTopRightRadius:28,
                                    borderBottom:'none',
                                    border:'1px solid var(--border)'
                                }}>
                                    {/* Handle bar */}
                                    <div style={{display:'flex',justifyContent:'center',paddingTop:12,paddingBottom:4}}>
                                        <div style={{width:40,height:4,background:'rgba(255,255,255,0.15)',borderRadius:4}}></div>
                                    </div>
                                    <div className="p-6">
                                        <div className="flex justify-between items-center mb-5">
                                            <h2 className="font-display text-3xl text-white">HERRAMIENTAS</h2>
                                            <button onClick={() => { setIsActive(false); setShowTools(false); }} style={{
                                                width:36,height:36,
                                                background:'rgba(255,255,255,0.08)',
                                                borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',
                                                color:'var(--muted)'
                                            }}>
                                                <Icon name="xmark" />
                                            </button>
                                        </div>

                                        {/* Segment */}
                                        <div className="segment mb-6">
                                            <button
                                                className={`segment-btn ${toolMode==='chrono'?'active':''}`}
                                                onClick={() => { setToolMode('chrono'); setSeconds(0); setIsActive(false); }}
                                            >CRONÓMETRO</button>
                                            <button
                                                className={`segment-btn ${toolMode==='timer'?'active':''}`}
                                                onClick={() => { setToolMode('timer'); setSeconds(60); setIsActive(false); }}
                                            >TEMPORIZADOR</button>
                                        </div>

                                        {/* Timer display */}
                                        <div style={{
                                            background:'rgba(255,255,255,0.03)',
                                            border:'1px solid var(--border)',
                                            borderRadius:20,
                                            padding:'32px 24px',
                                            textAlign:'center',
                                            marginBottom:20,
                                            transition:'border-color 0.3s'
                                        }}>
                                            <p style={{color:'var(--muted)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:8}}>
                                                {toolMode==='chrono' ? 'Tiempo transcurrido' : 'Tiempo de descanso'}
                                            </p>
                                            <div className={`timer-display ${toolMode==='timer' && seconds < 10 ? 'danger' : ''}`}>
                                                {formatTime(seconds)}
                                            </div>
                                        </div>

                                        {/* Quick time buttons (timer mode) */}
                                        {toolMode === 'timer' && !isActive && (
                                            <div style={{display:'flex',gap:8,marginBottom:16,justifyContent:'center'}}>
                                                {[30, 60, 90, 120].map(t => (
                                                    <button
                                                        key={t}
                                                        onClick={() => setSeconds(t)}
                                                        style={{
                                                            background: seconds===t ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.05)',
                                                            border: seconds===t ? '1px solid rgba(34,197,94,0.3)' : '1px solid rgba(255,255,255,0.08)',
                                                            color: seconds===t ? 'var(--accent)' : 'var(--muted)',
                                                            borderRadius:10,padding:'8px 14px',
                                                            fontSize:12,fontWeight:700,
                                                            cursor:'pointer',transition:'all 0.2s'
                                                        }}
                                                    >{t}s</button>
                                                ))}
                                            </div>
                                        )}

                                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                                            <button
                                                onClick={() => { setSeconds(toolMode==='chrono' ? 0 : 60); setIsActive(false); }}
                                                className="btn-ghost py-4 font-bold text-sm"
                                            >
                                                <Icon name="rotate-left" className="mr-2" />REINICIAR
                                            </button>
                                            <button
                                                onClick={() => setIsActive(!isActive)}
                                                style={{
                                                    background: isActive ? '#16a34a' : 'var(--accent)',
                                                    color: 'var(--ink)',
                                                    borderRadius:14,
                                                    padding:'16px',
                                                    fontFamily:"'Bebas Neue',sans-serif",
                                                    fontSize:20,
                                                    letterSpacing:'0.04em',
                                                    cursor:'pointer',
                                                    transition:'all 0.2s',
                                                    border:'none'
                                                }}
                                            >
                                                {isActive ? 'PAUSAR' : 'EMPEZAR'}
                                            </button>
                                        </div>

                                        <button onClick={() => { setIsActive(false); setShowTools(false); }} style={{
                                            width:'100%',marginTop:16,
                                            color:'var(--muted)',fontSize:11,
                                            fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',
                                            background:'none',border:'none',cursor:'pointer'
                                        }}>
                                            Volver a la rutina
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ---- ACHIEVEMENT MODAL ---- */}
                        {showAchievement && (
                            <div className="fixed inset-0 z-[200] flex items-center justify-center modal-overlay p-4 anim-fadeIn">
                                <div className="relative w-full max-w-sm flex flex-col items-center">
                                    <button
                                        onClick={() => setShowAchievement(false)}
                                        style={{alignSelf:'flex-end',color:'rgba(255,255,255,0.5)',fontSize:24,padding:8,marginBottom:8,background:'none',border:'none',cursor:'pointer'}}
                                    >
                                        <Icon name="xmark" />
                                    </button>

                                    <div id="achievement-card" style={{
                                        aspectRatio:'9/16',
                                        width:'100%',
                                        overflow:'hidden',
                                        borderRadius:40,
                                        background:'linear-gradient(135deg, #0a0a0f 0%, #13131a 40%, #1a1a30 100%)',
                                        padding:32,
                                        display:'flex',flexDirection:'column',
                                        alignItems:'center',justifyContent:'space-between',
                                        textAlign:'center',
                                        border:'3px solid rgba(34,197,94,0.2)',
                                        position:'relative',
                                        overflow:'hidden'
                                    }}>
                                        {/* BG accent */}
                                        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:'rgba(34,197,94,0.08)',borderRadius:'50%',filter:'blur(40px)'}}></div>

                                        <div style={{marginTop:32,position:'relative',zIndex:1}}>
                                            <div style={{
                                                display:'inline-block',
                                                background:'rgba(34,197,94,0.1)',
                                                border:'1px solid rgba(34,197,94,0.25)',
                                                borderRadius:50,padding:'4px 16px',
                                                fontSize:10,fontWeight:700,
                                                color:'var(--accent)',
                                                letterSpacing:'0.15em',textTransform:'uppercase',
                                                marginBottom:16
                                            }}>Activa-T Gym</div>
                                            <h2 style={{
                                                fontFamily:"'Bebas Neue',sans-serif",
                                                fontSize:52,color:'white',
                                                lineHeight:0.95
                                            }}>ENTRENO<br/>COMPLETADO</h2>
                                        </div>

                                        <div style={{position:'relative',zIndex:1,padding:'24px 0'}}>
                                            <div style={{
                                                width:72,height:72,
                                                background:'var(--accent)',
                                                borderRadius:20,
                                                display:'flex',alignItems:'center',justifyContent:'center',
                                                margin:'0 auto 16px',
                                                boxShadow:'0 0 40px rgba(34,197,94,0.5)'
                                            }}>
                                                <Icon name="dumbbell" style={{color:'black',fontSize:28}} />
                                            </div>
                                            <p style={{color:'rgba(255,255,255,0.5)',fontSize:12,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:6}}>
                                                Bravo, {currentUser?.name}
                                            </p>
                                            <p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:'white',lineHeight:1.1,padding:'0 16px'}}>
                                                {completedWorkoutTitle}
                                            </p>
                                        </div>

                                        <div style={{marginBottom:32,position:'relative',zIndex:1}}>
                                            <div style={{
                                                background:'var(--accent)',
                                                borderRadius:12,padding:'8px 20px',
                                                display:'inline-block'
                                            }}>
                                                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:'black',letterSpacing:'0.05em'}}>
                                                    @activat_gymdance
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
                                        <button
                                            onClick={handleShareAchievement}
                                            className="btn-accent w-full py-4 font-display text-xl tracking-wider flex items-center justify-center gap-3"
                                            style={{borderRadius:16}}
                                        >
                                            <Icon name="share-nodes" />COMPARTIR LOGRO
                                        </button>
                                        <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,textAlign:'center',textTransform:'uppercase',letterSpacing:'0.1em'}}>
                                            📸 O haz una captura de pantalla
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GymApp />);
    </script>
</body>
</html>
